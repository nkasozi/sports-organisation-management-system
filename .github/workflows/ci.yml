name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    env:
      PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_placeholder
      PUBLIC_CONVEX_URL: https://placeholder.convex.cloud

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high

      - run: npm run check

      - run: npm run build

      - run: npm run test
